<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastrar Carro</title>
</head>
<body>
  <h1>Cadastrar Carro</h1>
  <form id="carroForm">
    <label>ID: <input name="id" required></label><br>
    <label>Marca: <input name="marca"></label><br>
    <label>Modelo: <input name="modelo"></label><br>
    <button type="submit">Enviar</button>
  </form>

  <div id="result" style="margin-top:1rem;color:green"></div>

  <script>
    document.getElementById('carroForm').addEventListener('submit', async function(e){
      e.preventDefault();
      const form = e.target;
      const data = Object.fromEntries(new FormData(form).entries());
      try {
        const res = await fetch('/carros', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify(data)
        });
        const json = await res.json();
        document.getElementById('result').textContent = JSON.stringify(json);
      } catch (err) {
        document.getElementById('result').textContent = 'Erro: ' + err;
      }
    });
  </script>

  <p><a href="/carros">Voltar à lista</a></p>
</body>
</html>
